# Workflow Status Template

# This tracks progress through BMM methodology Analysis, Planning, and Solutioning phases.
# Implementation phase is tracked separately in sprint-status.yaml

# STATUS DEFINITIONS:
# ==================
# Initial Status (before completion):
#   - required: Must be completed to progress
#   - optional: Can be completed but not required
#   - recommended: Strongly suggested but not required
#   - conditional: Required only if certain conditions met (e.g., if_has_ui)
#
# Completion Status:
#   - {file-path}: File created/found (e.g., "docs/product-brief.md")
#   - skipped: Optional/conditional workflow that was skipped

generated: "2025-11-29"
project: "testdata-generator"
project_type: "Test Data Management Platform with DSL-based generation"
selected_track: "bmad-method"
field_type: "greenfield"
workflow_path: ".bmad/bmm/workflows/workflow-status/paths/method-greenfield.yaml"

workflow_status:
  # Phase 0: Discovery (Optional - All Selected)
  - phase: 0
    name: "Discovery (Optional)"
    workflows:
      - id: "brainstorm-project"
        name: "Brainstorm Project"
        agent: "analyst"
        command: "*brainstorm-project"
        status: "docs/brainstorming-session-results-2025-11-29.md"

      - id: "research"
        name: "Research"
        agent: "analyst"
        command: "*research"
        status: "docs/research-technical-2025-12-03.md"

      - id: "product-brief"
        name: "Product Brief"
        agent: "analyst"
        command: "*product-brief"
        status: "docs/product-brief-testdata-generator-2025-12-11.md"

  # Phase 1: Planning
  - phase: 1
    name: "Planning"
    workflows:
      - id: "prd"
        name: "Product Requirements Document"
        agent: "pm"
        command: "*prd"
        status: "docs/prd.md"
        output: "Product Requirements Document with FRs and NFRs"

      - id: "validate-prd"
        name: "Validate PRD"
        agent: "pm"
        command: "*validate-prd"
        status: "optional"
        note: "Quality check for PRD completeness"

      - id: "create-design"
        name: "Create UX Design"
        agent: "ux-designer"
        command: "*create-design"
        status: "conditional"
        note: "Determined after PRD - user/agent decides if needed"

  # Phase 2: Solutioning
  - phase: 2
    name: "Solutioning"
    workflows:
      - id: "create-architecture"
        name: "Create Architecture"
        agent: "architect"
        command: "*create-architecture"
        status: "docs/architecture.md"
        output: "System architecture document"
        note: "Complete system design for greenfield projects"

      - id: "create-epics-and-stories"
        name: "Create Epics and Stories"
        agent: "pm"
        command: "*create-epics-and-stories"
        status: "required"
        note: "Break down PRD into implementable epics and stories with full context"

      - id: "test-design"
        name: "Test Design"
        agent: "tea"
        command: "*test-design"
        status: "recommended"
        output: "System-level testability review"
        note: "Testability assessment before gate check"

      - id: "validate-architecture"
        name: "Validate Architecture"
        agent: "architect"
        command: "*validate-architecture"
        status: "optional"
        note: "Quality check for architecture completeness"

      - id: "implementation-readiness"
        name: "Implementation Readiness"
        agent: "architect"
        command: "*implementation-readiness"
        status: "required"
        note: "Validates PRD + UX + Architecture + Epics + Testability cohesion"

  # Phase 3: Implementation
  - phase: 3
    name: "Implementation"
    workflows:
      - id: "sprint-planning"
        name: "Sprint Planning"
        agent: "sm"
        command: "*sprint-planning"
        status: "required"
        note: "Creates sprint plan - subsequent work tracked in sprint-status.yaml"
