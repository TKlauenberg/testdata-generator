name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Format, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run linting
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Build packages
        run: bun run build

      - name: Verify CLI build artifact is up to date
        run: git diff --exit-code -- packages/cli/dist/td.js

      - name: Run unit tests
        run: bun test

      - name: Run BDD tests
        run: bun run test:bdd
